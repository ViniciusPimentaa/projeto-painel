<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Atendimento</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<main class="painel">

    <header class="topo">
        <h1>ATENDIMENTO</h1>
    </header>
    
    <section class="principal">
        <div class="bloco senha">
            <p class="label">SENHA</p>

            <p class="tipo" id="tipoDeSenha"></p>
            <p class="valor_1" id="senhaAtual">E2505</p>
        </div>

        <div class="bloco mesa">
            <p class="label">MESA</p>
            <p class="valor_1" id="mesaAtual">5</p>
        </div>
    </section>
    <section class="area-ultimas">

        <section class="ultimas-background">
            <p class="p-ultimas">ÚLTIMAS <br>CHAMADAS</p>
        </section>

        <section class="container">
            <div class="bloco1">
                <div class="linha alinhamento_mesa_senha">
                    <span>SENHA</span>
                    <span>MESA</span>
                </div>
                <div class="linha alinhamento_senha_mesa">
                    <span>S6508</span>
                    <span>7</span>
                </div>
            </div>

            <div class="bloco2">
                <div class="linha alinhamento_mesa_senha">
                    <span>SENHA</span>
                    <span>MESA</span>
                </div>
                <div class="linha alinhamento_senha_mesa">
                    <span>B1508</span>
                    <span>6</span>
                </div>
            </div>

            <div class="bloco3">
                <div class="linha alinhamento_mesa_senha">
                    <span>SENHA</span>
                    <span>MESA</span>
                </div>
                <div class="linha alinhamento_senha_mesa">
                    <span>A1000</span>
                    <span>6</span>
                </div>
            </div>

            <div class="bloco4">
                <div class="linha alinhamento_mesa_senha">
                    <span>SENHA</span>
                    <span>MESA</span>
                </div>
                <div class="linha alinhamento_senha_mesa">
                    <span>H3504</span>
                    <span>8</span>
                </div>
            </div>
        </section>
    </section>
     <p class="msg_bem_vindo">Bem-vindo ao Poupatempo de BRAGANÇA PAULISTA | Welcome to Poupatempo of BRAGANÇA PAULISTA</p>
</main>

<script src="assets/js/main.js"></script>
</body>
</html>
